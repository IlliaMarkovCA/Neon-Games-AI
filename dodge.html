<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Neon Dodge</title>
<style>
  :root { --cyan:#00ffe1; --pink:#ff2bd6; --yellow:#ffe600; --bg:#05050f; --panel:#0c0c1e; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; background:var(--bg); font-family:'Courier New',monospace; color:var(--cyan); overflow:hidden; }
  #wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:10px; }
  #topbar { display:flex; gap:20px; align-items:center; width:100%; max-width:700px; padding:0 8px; letter-spacing:2px; font-size:15px; text-shadow:0 0 8px rgba(0,255,225,0.5); }
  #topbar b { color:#fff; }
  #timerOuter { flex:1; height:10px; background:#0c0c1e; border:1px solid var(--cyan); }
  #timerInner { height:100%; width:100%; background:linear-gradient(90deg,var(--cyan),var(--pink)); transition:width 0.1s linear; }
  #slowOuter { width:80px; height:10px; background:#0c0c1e; border:1px solid var(--yellow); }
  #slowInner { height:100%; width:0%; background:var(--yellow); }
  #gameCanvas { border:2px solid var(--cyan); box-shadow:0 0 28px rgba(0,255,225,0.2); display:block; }
  #hint { font-size:13px; color:#7d8bb8; letter-spacing:1px; text-align:center; }
  #hint b { color:var(--cyan); }
  #overlay { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; text-align:center; background:rgba(5,5,15,0.88); }
  #overlay.hidden { display:none; }
  #overlay h1 { font-size:clamp(22px,5vw,46px); letter-spacing:8px; margin-bottom:10px; color:var(--cyan); text-shadow:0 0 20px rgba(0,255,225,0.55); }
  #overlay p { color:#9aa6c4; font-size:14px; line-height:1.7; max-width:420px; }
  #overlay p b { color:var(--pink); }
  #overlayBtn { margin-top:22px; padding:12px 36px; background:transparent; border:2px solid var(--pink); color:var(--pink); font-family:inherit; font-size:16px; letter-spacing:4px; cursor:pointer; transition:background 0.15s,color 0.15s; }
  #overlayBtn:hover { background:var(--pink); color:var(--bg); }
  #overlayScore { margin-top:8px; font-size:13px; color:#7d8bb8; }
</style>
</head>
<body>
<div id="wrap">
  <div id="topbar">
    <span>TIME <div id="timerOuter"><div id="timerInner"></div></div></span>
    <span>SCORE <b id="scoreVal">0</b></span>
    <span>WAVE <b id="waveVal">1</b></span>
    <span style="color:var(--yellow)">SLOW <div id="slowOuter"><div id="slowInner"></div></div></span>
  </div>
  <div style="position:relative;">
    <canvas id="gameCanvas" width="700" height="520"></canvas>
    <div id="overlay">
      <h1 id="overlayTitle">NEON DODGE</h1>
      <p id="overlayMsg">
        Dodge waves of pink bullets for <b>60 seconds</b>.<br>
        Collect <b>cyan pickups</b> to slow time for 3 seconds.<br><br>
        Move with <b>E S D F</b> keys. One life — don't get hit!
      </p>
      <button id="overlayBtn">START</button>
      <div id="overlayScore"></div>
    </div>
  </div>
  <div id="hint"><b>E</b> up · <b>S</b> left · <b>D</b> down · <b>F</b> right &nbsp;|&nbsp; Collect <b style="color:#00ffe1">cyan</b> orbs to slow time</div>
</div>
<script>
/* ================================================================
   NEON DODGE — top-down bullet hell survival (60 seconds)
   ESDF movement, slow-time pickups, escalating wave patterns.
   ================================================================ */
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const C_BG     = '#05050f';
const C_CYAN   = '#00ffe1';
const C_PINK   = '#ff2bd6';
const C_YELLOW = '#ffe600';

const GAME_DURATION = 60000; // 60s
const PLAYER_SPD    = 3.6;
const PLAYER_R      = 10;
const BULLET_R      = 6;
const PICKUP_R      = 9;
const SLOW_DURATION = 3000;  // ms
const SLOW_FACTOR   = 0.28;  // time scale when slow is active

// ── state ────────────────────────────────────────────────
let player, bullets, pickups, particles;
let score, timeLeft, wave, gameState;
let slowTimer, isSlowed;
let shakeX = 0, shakeY = 0, shakeMag = 0;
let waveTimer, nextWaveSpawn;
let highScore = 0;
let keys = {};

function initState() {
  player    = { x: W/2, y: H/2, r: PLAYER_R, trail: [] };
  bullets   = [];
  pickups   = [];
  particles = [];
  score     = 0;
  timeLeft  = GAME_DURATION;
  wave      = 1;
  gameState = 'playing';
  slowTimer = 0;
  isSlowed  = false;
  shakeX=shakeY=shakeMag=0;
  waveTimer     = 0;
  nextWaveSpawn = 1800;
  spawnPickup();
  document.getElementById('scoreVal').textContent = 0;
  document.getElementById('waveVal').textContent  = 1;
  document.getElementById('timerInner').style.width = '100%';
  document.getElementById('slowInner').style.width  = '0%';
}

// ── input ─────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (['e','s','d','f',' '].includes(e.key.toLowerCase())) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// ── spawners ──────────────────────────────────────────────
function spawnWave(dt) {
  waveTimer += dt;
  if (waveTimer < nextWaveSpawn) return;
  waveTimer = 0;
  nextWaveSpawn = Math.max(600, 1800 - wave * 100);

  const type = Math.floor(Math.random() * 4);
  const spd  = 2.2 + wave * 0.28;

  if (type === 0) {
    // Ring from center
    const n = 10 + wave * 2;
    for (let i=0; i<n; i++) {
      const a = (i/n)*Math.PI*2;
      bullets.push({ x:W/2, y:H/2, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd, trail:[] });
    }
  } else if (type === 1) {
    // Wall from random edge
    const edge = Math.floor(Math.random()*4);
    const count = 6 + wave;
    for (let i=0; i<count; i++) {
      let bx,by,vx,vy;
      const t = (i/(count-1));
      if (edge===0) { bx=t*W; by=-10; vx=(Math.random()-0.5)*1.5; vy=spd; }
      else if(edge===1) { bx=t*W; by=H+10; vx=(Math.random()-0.5)*1.5; vy=-spd; }
      else if(edge===2) { bx=-10; by=t*H; vx=spd; vy=(Math.random()-0.5)*1.5; }
      else              { bx=W+10; by=t*H; vx=-spd; vy=(Math.random()-0.5)*1.5; }
      bullets.push({ x:bx, y:by, vx, vy, trail:[] });
    }
  } else if (type === 2) {
    // Aimed burst from random corner
    const corners = [[0,0],[W,0],[0,H],[W,H]];
    const [cx,cy] = corners[Math.floor(Math.random()*4)];
    const n = 5 + wave;
    const baseA = Math.atan2(player.y-cy, player.x-cx);
    for (let i=0; i<n; i++) {
      const a = baseA + (i - n/2) * 0.15;
      bullets.push({ x:cx, y:cy, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd, trail:[] });
    }
  } else {
    // Spiral from edge
    const fromTop = Math.random() < 0.5;
    const n = 8 + wave;
    for (let i=0; i<n; i++) {
      const a = (i/n)*Math.PI*2 + wave*0.3;
      const bx = fromTop ? W/2 : W/2;
      const by = fromTop ? -10  : H+10;
      const dir = fromTop ? 1 : -1;
      bullets.push({ x:bx+Math.cos(a)*20, y:by, vx:Math.cos(a)*spd*0.5, vy:dir*spd, trail:[] });
    }
  }
}

function spawnPickup() {
  // Keep 1-2 pickups on screen
  if (pickups.length >= 2) return;
  const margin = 40;
  pickups.push({
    x: margin + Math.random()*(W-margin*2),
    y: margin + Math.random()*(H-margin*2),
    pulse: Math.random()*Math.PI*2
  });
}

// ── particles ─────────────────────────────────────────────
function spawnParticles(x,y,color,n,spd,life) {
  for (let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, v=spd*(0.4+Math.random()*0.6);
    particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:life||28,maxLife:life||28,color,size:2+Math.random()*3});
  }
}

// ── update ────────────────────────────────────────────────
function update(dt) {
  if (gameState !== 'playing') { updateParticles(dt,1); return; }

  // Time scale (slow-mo)
  const ts = isSlowed ? SLOW_FACTOR : 1.0;

  // Real-time countdown (not slowed — timer runs at real speed)
  timeLeft -= dt;
  document.getElementById('timerInner').style.width = Math.max(0, (timeLeft/GAME_DURATION)*100) + '%';

  if (timeLeft <= 0) { win(); return; }

  // Wave escalation (real time)
  wave = Math.floor(1 + (1 - timeLeft/GAME_DURATION) * 8);
  document.getElementById('waveVal').textContent = wave;

  // Slow timer
  if (isSlowed) {
    slowTimer -= dt;
    document.getElementById('slowInner').style.width = Math.max(0,(slowTimer/SLOW_DURATION)*100)+'%';
    if (slowTimer <= 0) { isSlowed = false; document.getElementById('slowInner').style.width='0%'; }
  }

  // Screenshake decay
  shakeMag *= 0.8;
  shakeX = (Math.random()-0.5)*shakeMag;
  shakeY = (Math.random()-0.5)*shakeMag;

  // Player movement (not slowed)
  if (keys['e']) player.y -= PLAYER_SPD;
  if (keys['d']) player.y += PLAYER_SPD;
  if (keys['s']) player.x -= PLAYER_SPD;
  if (keys['f']) player.x += PLAYER_SPD;
  player.x = Math.max(PLAYER_R, Math.min(W-PLAYER_R, player.x));
  player.y = Math.max(PLAYER_R, Math.min(H-PLAYER_R, player.y));

  player.trail.unshift({ x:player.x, y:player.y });
  if (player.trail.length > 8) player.trail.pop();

  // Wave spawn (real time)
  spawnWave(dt);

  // Pickup spawn (real time)
  if (Math.random() < 0.003) spawnPickup();

  // Score (real time)
  score += dt * 0.015 * wave;
  document.getElementById('scoreVal').textContent = Math.floor(score);

  // Bullets (slowed by ts)
  for (let i=bullets.length-1; i>=0; i--) {
    const b = bullets[i];
    b.trail.unshift({x:b.x,y:b.y});
    if (b.trail.length > 7) b.trail.pop();
    b.x += b.vx * ts; b.y += b.vy * ts;

    // Remove off-screen
    if (b.x < -30 || b.x > W+30 || b.y < -30 || b.y > H+30) {
      bullets.splice(i,1); continue;
    }

    // Player hit
    if (Math.hypot(b.x-player.x, b.y-player.y) < PLAYER_R + BULLET_R - 2) {
      die(); return;
    }

    // Near-miss screenshake
    const nearDist = Math.hypot(b.x-player.x, b.y-player.y);
    if (nearDist < PLAYER_R + BULLET_R + 14 && nearDist > PLAYER_R + BULLET_R) {
      shakeMag = Math.max(shakeMag, 3);
    }
  }

  // Pickups
  for (let i=pickups.length-1; i>=0; i--) {
    const p = pickups[i];
    p.pulse += 0.07;
    if (Math.hypot(p.x-player.x, p.y-player.y) < PLAYER_R + PICKUP_R + 4) {
      pickups.splice(i,1);
      isSlowed   = true;
      slowTimer  = SLOW_DURATION;
      document.getElementById('slowInner').style.width='100%';
      score += 30;
      spawnParticles(p.x, p.y, C_CYAN, 18, 5);
      spawnParticles(p.x, p.y, C_YELLOW, 8, 7);
    }
  }

  updateParticles(dt, ts);
}

function updateParticles(dt, ts=1) {
  for (let i=particles.length-1; i>=0; i--) {
    const p=particles[i];
    p.x+=p.vx*ts; p.y+=p.vy*ts; p.vy+=0.15*ts;
    p.life -= ts > 0.5 ? 1 : 0.4;
    if (p.life<=0) particles.splice(i,1);
  }
}

function die() {
  gameState = 'dead';
  spawnParticles(player.x, player.y, C_CYAN, 20, 7);
  spawnParticles(player.x, player.y, C_PINK, 14, 5);
  shakeMag = 14;
  if (Math.floor(score) > highScore) highScore = Math.floor(score);
  setTimeout(() => showOverlay(false), 700);
}

function win() {
  gameState = 'win';
  spawnParticles(W/2, H/2, C_YELLOW, 30, 8, 60);
  spawnParticles(W/2, H/2, C_CYAN,   20, 6, 50);
  if (Math.floor(score) > highScore) highScore = Math.floor(score);
  setTimeout(() => showOverlay(true), 400);
}

// ── draw ──────────────────────────────────────────────────
function drawBackground() {
  ctx.fillStyle = C_BG; ctx.fillRect(0,0,W,H);
  // Neon grid
  ctx.strokeStyle = 'rgba(0,255,225,0.05)'; ctx.lineWidth=1;
  for (let x=0;x<=W;x+=40){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
  for (let y=0;y<=H;y+=40){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
  // Border glow
  ctx.save();
  ctx.strokeStyle = C_CYAN; ctx.lineWidth=2;
  ctx.shadowColor = C_CYAN; ctx.shadowBlur = 10;
  ctx.strokeRect(1,1,W-2,H-2);
  ctx.restore();
  // Slow-mo tint
  if (isSlowed) {
    ctx.fillStyle = `rgba(0,255,225,${0.04 + 0.02*Math.sin(Date.now()*0.008)})`;
    ctx.fillRect(0,0,W,H);
  }
}

function drawPlayer() {
  if (gameState === 'dead') return;
  // Trail
  for (let i=player.trail.length-1; i>=0; i--) {
    const t=player.trail[i];
    ctx.globalAlpha = (1-i/player.trail.length)*0.35;
    ctx.fillStyle   = C_CYAN;
    ctx.beginPath(); ctx.arc(t.x,t.y,PLAYER_R*(1-i/player.trail.length*0.5),0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  // Body
  ctx.save();
  ctx.shadowColor=C_CYAN; ctx.shadowBlur=18+(isSlowed?8:0);
  const pGrad = ctx.createRadialGradient(player.x,player.y,0,player.x,player.y,PLAYER_R);
  pGrad.addColorStop(0,'#ffffff'); pGrad.addColorStop(0.4,C_CYAN); pGrad.addColorStop(1,'#005566');
  ctx.fillStyle = pGrad;
  ctx.beginPath(); ctx.arc(player.x,player.y,PLAYER_R,0,Math.PI*2); ctx.fill();
  // Ring
  ctx.strokeStyle=C_CYAN; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(player.x,player.y,PLAYER_R+4,0,Math.PI*2); ctx.stroke();
  ctx.restore();
}

function drawBullets() {
  for (const b of bullets) {
    // Trail
    for (let i=b.trail.length-1;i>=0;i--) {
      const t=b.trail[i];
      ctx.globalAlpha=(1-i/b.trail.length)*0.35;
      ctx.fillStyle=C_PINK;
      ctx.beginPath(); ctx.arc(t.x,t.y,BULLET_R*(1-i/b.trail.length*0.4),0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
    ctx.save();
    ctx.shadowColor=C_PINK; ctx.shadowBlur=14;
    ctx.fillStyle=C_PINK;
    ctx.beginPath(); ctx.arc(b.x,b.y,BULLET_R,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.arc(b.x-2,b.y-2,2,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

function drawPickups() {
  for (const p of pickups) {
    const pulse = 0.85 + 0.15*Math.sin(p.pulse);
    ctx.save();
    ctx.shadowColor=C_CYAN; ctx.shadowBlur=20*pulse;
    // Outer ring
    ctx.strokeStyle=C_CYAN; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(p.x,p.y,PICKUP_R+4*pulse,0,Math.PI*2); ctx.stroke();
    // Body
    ctx.fillStyle=C_CYAN;
    ctx.beginPath(); ctx.arc(p.x,p.y,PICKUP_R*pulse,0,Math.PI*2); ctx.fill();
    // Center
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.beginPath(); ctx.arc(p.x-2,p.y-2,3,0,Math.PI*2); ctx.fill();
    // SLOW label
    ctx.fillStyle=C_CYAN; ctx.font='bold 9px Courier New'; ctx.textAlign='center';
    ctx.shadowBlur=0;
    ctx.fillText('SLOW',p.x,p.y+PICKUP_R+14);
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=6;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

function render() {
  ctx.save();
  ctx.translate(shakeX, shakeY);
  drawBackground();
  drawPickups();
  drawBullets();
  drawPlayer();
  drawParticles();
  ctx.restore();
}

// ── overlay ───────────────────────────────────────────────
const overlay      = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayMsg   = document.getElementById('overlayMsg');
const overlayBtn   = document.getElementById('overlayBtn');
const overlayScore = document.getElementById('overlayScore');

function showOverlay(won) {
  overlayTitle.textContent = won ? 'YOU SURVIVED!' : 'HIT!';
  overlayMsg.innerHTML = won
    ? `60 seconds cleared! Final score: <b>${Math.floor(score)}</b>`
    : `A bullet got you. Score: <b>${Math.floor(score)}</b> &nbsp;|&nbsp; Wave: <b>${wave}</b>`;
  overlayScore.textContent = 'High score: ' + highScore;
  overlayBtn.textContent   = 'RETRY';
  overlay.classList.remove('hidden');
}

overlayBtn.addEventListener('click', () => {
  overlay.classList.add('hidden');
  initState();
});

// ── loop ──────────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  const dt = ts - lastTime; lastTime = ts;
  update(dt); render();
  requestAnimationFrame(loop);
}

initState();
requestAnimationFrame(loop);
</script>
</body>
</html>
