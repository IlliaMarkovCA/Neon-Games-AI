<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Neon Flap</title>
<style>
  :root { --cyan:#00ffe1; --pink:#ff2bd6; --yellow:#ffe600; --bg:#05050f; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; background:var(--bg); font-family:'Courier New',monospace; color:var(--cyan); overflow:hidden; }
  #wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:10px; }
  #topbar { display:flex; gap:28px; align-items:center; width:100%; max-width:480px; padding:0 8px; letter-spacing:2px; font-size:15px; text-shadow:0 0 8px rgba(0,255,225,0.5); }
  #topbar b { color:#fff; }
  #gameCanvas { border:2px solid var(--cyan); box-shadow:0 0 28px rgba(0,255,225,0.22); display:block; cursor:pointer; max-height:75vh; }
  #hint { font-size:13px; color:#7d8bb8; letter-spacing:1px; text-align:center; }
  #hint b { color:var(--cyan); }
  #overlay { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; text-align:center; background:rgba(5,5,15,0.87); }
  #overlay.hidden { display:none; }
  #overlay h1 { font-size:clamp(26px,6vw,50px); letter-spacing:8px; margin-bottom:10px; color:var(--cyan); text-shadow:0 0 22px rgba(0,255,225,0.6); }
  #overlay p { color:#9aa6c4; font-size:14px; line-height:1.7; max-width:380px; }
  #overlay p b { color:var(--pink); }
  #overlayBtn { margin-top:22px; padding:12px 36px; background:transparent; border:2px solid var(--pink); color:var(--pink); font-family:inherit; font-size:16px; letter-spacing:4px; cursor:pointer; text-shadow:0 0 8px rgba(255,43,214,0.5); transition:background 0.15s,color 0.15s; }
  #overlayBtn:hover { background:var(--pink); color:var(--bg); }
  #overlayScore { margin-top:8px; font-size:13px; color:#7d8bb8; }
</style>
</head>
<body>
<div id="wrap">
  <div id="topbar">
    <span>SCORE <b id="scoreVal">0</b></span>
    <span>BEST  <b id="bestVal">0</b></span>
  </div>
  <div style="position:relative;">
    <canvas id="gameCanvas" width="480" height="600"></canvas>
    <div id="overlay">
      <h1 id="overlayTitle">NEON FLAP</h1>
      <p id="overlayMsg">Flap through the neon pipes.<br><b>SPACE</b> or <b>click / tap</b> to flap.<br>Don't touch the pipes or the ground!</p>
      <button id="overlayBtn">START</button>
      <div id="overlayScore"></div>
    </div>
  </div>
  <div id="hint"><b>SPACE</b> or <b>click</b> to flap</div>
</div>

<script>
/* ================================================================
   NEON FLAP — Flappy Bird, pure canvas, zero dependencies.
   ================================================================ */
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── constants ────────────────────────────────────────────
const GRAVITY    = 0.42;
const FLAP_V     = -8.2;
const PIPE_W     = 64;
const PIPE_GAP   = 155;   // vertical opening height
const PIPE_SPEED = 2.8;
const PIPE_SPAWN = 220;   // left-edge to left-edge distance between pipes
const BIRD_SIZE  = 26;
const GROUND_H   = 60;
const GROUND_Y   = H - GROUND_H;

const C_BG     = '#05050f';
const C_CYAN   = '#00ffe1';
const C_PINK   = '#ff2bd6';
const C_YELLOW = '#ffe600';

// ── state ─────────────────────────────────────────────────
let bird, pipes, particles, stars;
let score, bestScore = 0, gameState;
let bgOffset = 0, groundOffset = 0;
let flashAlpha = 0, deathTimer = 0;

// Pre-build star field once
function initStars() {
  stars = [];
  for (let i = 0; i < 50; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * GROUND_Y * 0.85,
      r: 0.5 + Math.random() * 1.2,
      twinkle: Math.random() * Math.PI * 2,
      dx: 0.15 + Math.random() * 0.3,
    });
  }
}

function initState() {
  bird = {
    x: 110, y: H / 2 - 40,
    vy: 0, rotation: 0,
    trail: [], alive: true,
  };
  pipes     = [];
  particles = [];
  score     = 0;
  gameState = 'playing';
  bgOffset = groundOffset = flashAlpha = deathTimer = 0;

  // Spawn first pipe well off the right edge so player has time to react
  spawnPipe(W + 160);

  document.getElementById('scoreVal').textContent = 0;
}

// ── pipe helpers ──────────────────────────────────────────
function spawnPipe(x) {
  const margin = 90;
  const gapTop = margin + Math.random() * (GROUND_Y - PIPE_GAP - margin * 2);
  pipes.push({ x, gapTop, gapBot: gapTop + PIPE_GAP, scored: false });
}

function maybeSpawnPipe() {
  // Spawn a new pipe when the LAST pipe's left edge has scrolled far enough
  // that a pipe placed at (W + PIPE_W) would be exactly PIPE_SPAWN px away.
  // Trigger: lastPipe.x <= W + PIPE_W - PIPE_SPAWN
  if (!pipes.length) { spawnPipe(W + 160); return; }
  const last = pipes[pipes.length - 1];
  if (last.x <= W + PIPE_W - PIPE_SPAWN) {
    spawnPipe(W + PIPE_W);
  }
}

// ── input ─────────────────────────────────────────────────
function doFlap() {
  if (gameState !== 'playing') return;
  bird.vy    = FLAP_V;
  flashAlpha = 0.16;
  spawnFlapParticles();
}
window.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); doFlap(); } });
canvas.addEventListener('click', doFlap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); doFlap(); }, { passive:false });

// ── particles ─────────────────────────────────────────────
// No shadowBlur on particles — use flat colours for performance.
function addParticles(x, y, color, n, spd, life) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const v = spd * (0.4 + Math.random() * 0.6);
    particles.push({ x, y, vx: Math.cos(a)*v, vy: Math.sin(a)*v, life, maxLife: life, color, size: 2 + Math.random() * 3 });
  }
}
function spawnFlapParticles() {
  addParticles(bird.x, bird.y + BIRD_SIZE/2, C_CYAN, 4, 2, 16);
}
function spawnDeathParticles() {
  addParticles(bird.x, bird.y, C_CYAN,   10, 5, 34);
  addParticles(bird.x, bird.y, C_PINK,    8, 4, 28);
  addParticles(bird.x, bird.y, C_YELLOW,  6, 6, 24);
}
function spawnScoreParticles(x, y) {
  addParticles(x, y, C_YELLOW, 6, 3, 20);
}

// ── update ────────────────────────────────────────────────
function update() {
  if (gameState === 'dead') {
    deathTimer++;
    updateParticles();
    bgOffset     = (bgOffset + 0.4) % 60;
    groundOffset = (groundOffset + 0.4) % 48;
    return;
  }
  if (gameState !== 'playing') return;

  bgOffset     = (bgOffset + 0.7) % 60;
  groundOffset = (groundOffset + PIPE_SPEED) % 48;

  // Bird physics
  bird.vy += GRAVITY;
  bird.y  += bird.vy;
  const targetRot = Math.min(Math.max(bird.vy * 3.5, -28), 88) * (Math.PI / 180);
  bird.rotation  += (targetRot - bird.rotation) * 0.18;

  bird.trail.unshift({ x: bird.x, y: bird.y });
  if (bird.trail.length > 9) bird.trail.pop();

  if (flashAlpha > 0) flashAlpha = Math.max(0, flashAlpha - 0.016);

  // Ceiling
  if (bird.y - BIRD_SIZE/2 < 0) { bird.y = BIRD_SIZE/2; bird.vy = 1; }

  // Ground
  if (bird.y + BIRD_SIZE/2 >= GROUND_Y) { bird.y = GROUND_Y - BIRD_SIZE/2; killBird(); return; }

  // Stars drift
  for (const s of stars) {
    s.twinkle += 0.03;
    s.x -= s.dx;
    if (s.x < 0) s.x = W + 1;
  }

  // Pipes: move, score, collide, cull
  maybeSpawnPipe();

  for (let i = pipes.length - 1; i >= 0; i--) {
    const p = pipes[i];
    p.x -= PIPE_SPEED;

    if (!p.scored && p.x + PIPE_W < bird.x) {
      p.scored = true;
      score++;
      document.getElementById('scoreVal').textContent = score;
      spawnScoreParticles(bird.x, bird.y);
    }

    if (p.x + PIPE_W < -10) { pipes.splice(i, 1); continue; }

    // Collision — tight inner box
    const bL = bird.x - BIRD_SIZE * 0.36, bR = bird.x + BIRD_SIZE * 0.36;
    const bT = bird.y - BIRD_SIZE * 0.36, bB = bird.y + BIRD_SIZE * 0.36;
    if (bR > p.x + 3 && bL < p.x + PIPE_W - 3) {
      if (bT < p.gapTop || bB > p.gapBot) { killBird(); return; }
    }
  }

  updateParticles();
}

function killBird() {
  if (!bird.alive) return;
  bird.alive = false;
  gameState  = 'dead';
  spawnDeathParticles();
  if (score > bestScore) {
    bestScore = score;
    document.getElementById('bestVal').textContent = bestScore;
  }
  setTimeout(showOverlay, 850);
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.2;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ── draw ──────────────────────────────────────────────────
// Shadow helpers — set once, used in a block, then cleared.
function setShadow(color, blur) { ctx.shadowColor = color; ctx.shadowBlur = blur; }
function clearShadow()          { ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; }

function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  g.addColorStop(0, '#08021a'); g.addColorStop(1, '#1a0630');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, GROUND_Y);

  // Pink horizon glow
  const hg = ctx.createLinearGradient(0, GROUND_Y * 0.65, 0, GROUND_Y);
  hg.addColorStop(0, 'rgba(255,43,214,0)'); hg.addColorStop(1, 'rgba(255,43,214,0.08)');
  ctx.fillStyle = hg; ctx.fillRect(0, GROUND_Y * 0.65, W, GROUND_Y * 0.35);

  // Stars (flat, no shadow — fast)
  for (const s of stars) {
    const a = 0.35 + 0.35 * Math.abs(Math.sin(s.twinkle));
    ctx.globalAlpha = a; ctx.fillStyle = '#fff';
    ctx.fillRect(s.x, s.y, s.r * 2, s.r * 2);
  }
  ctx.globalAlpha = 1;

  // Grid lines (parallax)
  ctx.strokeStyle = 'rgba(0,255,225,0.05)'; ctx.lineWidth = 1;
  const gs = 60;
  for (let x = -(bgOffset % gs); x < W + gs; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GROUND_Y); ctx.stroke();
  }
  for (let row = 0; row < 7; row++) {
    const t = row / 6;
    const y = GROUND_Y * 0.1 + GROUND_Y * 0.9 * (t * t);
    ctx.globalAlpha = 0.03 + t * 0.07;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawGround() {
  const g = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  g.addColorStop(0, '#1b1b35'); g.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = g; ctx.fillRect(0, GROUND_Y, W, GROUND_H);

  // Top glow edge — one shadow call, contained
  setShadow(C_CYAN, 10);
  ctx.strokeStyle = C_CYAN; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(W, GROUND_Y); ctx.stroke();
  clearShadow();

  // Ground grid lines (flat, fast)
  ctx.strokeStyle = 'rgba(0,255,225,0.09)'; ctx.lineWidth = 1;
  for (let x = -(groundOffset); x < W + 48; x += 48) {
    ctx.beginPath(); ctx.moveTo(x, GROUND_Y); ctx.lineTo(x, H); ctx.stroke();
  }
}

function drawPipes() {
  // One shadow state for all pipes
  setShadow(C_PINK, 12);
  for (const p of pipes) {
    _drawPipeBody(p.x, 0, p.gapTop, true);
    _drawPipeBody(p.x, p.gapBot, GROUND_Y - p.gapBot, false);
  }
  clearShadow();
}

function _drawPipeBody(x, y, h, isTop) {
  if (h <= 0) return;

  // Body
  const bg = ctx.createLinearGradient(x, 0, x + PIPE_W, 0);
  bg.addColorStop(0, '#2a002a'); bg.addColorStop(0.4, '#770044');
  bg.addColorStop(0.75, C_PINK); bg.addColorStop(1, '#440022');
  ctx.fillStyle = bg;
  ctx.fillRect(x, y, PIPE_W, h);

  // Highlight stripe (no shadow needed)
  ctx.fillStyle = 'rgba(255,255,255,0.09)';
  ctx.fillRect(x + 9, y, 7, h);

  // Cap
  const capH = 22, capX = x - 6, capW = PIPE_W + 12;
  const capY = isTop ? y + h - capH : y;
  ctx.fillStyle = C_PINK;
  roundRect(capX, capY, capW, capH, 4); ctx.fill();

  // Cap highlight
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  roundRect(capX + 4, capY + 3, capW - 8, 5, 2); ctx.fill();
}

function drawBird() {
  if (gameState === 'dead' && deathTimer > 6) return;

  // Trail (flat, no shadow)
  for (let i = bird.trail.length - 1; i >= 0; i--) {
    const t = bird.trail[i];
    ctx.globalAlpha = (1 - i / bird.trail.length) * 0.28;
    ctx.fillStyle   = C_CYAN;
    ctx.beginPath();
    ctx.arc(t.x, t.y, (BIRD_SIZE/2) * (1 - i/bird.trail.length*0.5), 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.rotation);

  // One shadow set for the bird body only
  setShadow(C_CYAN, 14);

  const half = BIRD_SIZE / 2;
  const bg = ctx.createLinearGradient(-half, -half, half, half);
  bg.addColorStop(0, '#ffffff'); bg.addColorStop(0.35, C_CYAN); bg.addColorStop(1, '#007788');
  ctx.fillStyle = bg;
  roundRect(-half, -half, BIRD_SIZE, BIRD_SIZE, 7);
  ctx.fill();

  clearShadow();

  // Inner frame
  ctx.strokeStyle = 'rgba(255,255,255,0.28)'; ctx.lineWidth = 1.5;
  roundRect(-half+5, -half+5, BIRD_SIZE-10, BIRD_SIZE-10, 3); ctx.stroke();

  // Centre dot
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI*2); ctx.fill();

  // Eye
  ctx.fillStyle = '#05050f';
  ctx.beginPath(); ctx.arc(half*0.42, -half*0.22, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(half*0.42+0.5, -half*0.22-0.5, 1.2, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawParticles() {
  // Flat fill only — no shadow, no gradient, very fast
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle   = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawFlash() {
  if (flashAlpha <= 0) return;
  ctx.fillStyle = `rgba(0,255,225,${flashAlpha.toFixed(3)})`;
  ctx.fillRect(0, 0, W, H);
}

function drawScoreBig() {
  ctx.textAlign = 'center';
  ctx.font      = 'bold 54px Courier New';
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  ctx.fillText(score, W/2, 92);
  ctx.textAlign = 'left';
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

function render() {
  drawSky(); drawPipes(); drawGround();
  drawBird(); drawParticles(); drawFlash(); drawScoreBig();
}

// ── overlay ───────────────────────────────────────────────
const overlay      = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayMsg   = document.getElementById('overlayMsg');
const overlayBtn   = document.getElementById('overlayBtn');
const overlayScore = document.getElementById('overlayScore');

function showOverlay() {
  const medal = score >= 20 ? '🏆 LEGEND' : score >= 10 ? '⭐ GREAT' : score >= 5 ? '✓ GOOD' : 'KEEP TRYING';
  overlayTitle.textContent = 'GAME OVER';
  overlayMsg.innerHTML     = `You scored <b>${score}</b> &nbsp;·&nbsp; ${medal}`;
  overlayScore.textContent = `Best: ${bestScore}`;
  overlayBtn.textContent   = 'RETRY';
  overlay.classList.remove('hidden');
}

overlayBtn.addEventListener('click', () => {
  overlay.classList.add('hidden');
  initState();
});

// ── loop ──────────────────────────────────────────────────
function loop() { update(); render(); requestAnimationFrame(loop); }

initStars();
initState();
render();
loop();
</script>
</body>
</html>
